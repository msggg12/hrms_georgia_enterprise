version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hrms
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: python:3.12-slim
    working_dir: /srv/hrms
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql://hrms:hrms@db:5432/hrms
      PUBLIC_BASE_URL: http://localhost:8000
      ENABLE_BACKGROUND_JOBS: 'true'
      NODE_CODE: cluster-node-1
      NODE_ROLE: api
      NODE_REGION: georgia
    ports:
      - '8000:8000'
    volumes:
      - ..:/srv/hrms
    depends_on:
      - db

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

volumes:
  pgdata:
